apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "lke-node-cache-manager.serviceAccountName" . }}
  labels:
    {{- include "lke-node-cache-manager.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# Do not mount ServiceAccount token; cache manager doesn't need API access.
automountServiceAccountToken: false
