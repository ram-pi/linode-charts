{{- if .Values.ui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "linode-vlan-topology-exporter.fullname" . }}-ui
  labels:
    {{- include "linode-vlan-topology-exporter.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "linode-vlan-topology-exporter.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "linode-vlan-topology-exporter.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: ui
      {{- with .Values.commonAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "linode-vlan-topology-exporter.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with .Values.deployment.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.deployment.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: topology-ui
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          env:
            - name: TOPOLOGY_UI_PORT
              value: {{ .Values.ui.port | quote }}
            - name: TOPOLOGY_METRICS_URL
              value: {{ printf "http://%s:%v/metrics" (include "linode-vlan-topology-exporter.fullname" .) .Values.service.port | quote }}
            - name: TOPOLOGY_REFRESH_SECONDS
              value: {{ .Values.ui.refreshSeconds | quote }}
            - name: TOPOLOGY_HTTP_TIMEOUT_SECONDS
              value: {{ .Values.ui.httpTimeoutSeconds | quote }}
          ports:
            - name: topology-ui
              containerPort: {{ .Values.ui.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: topology-ui
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: topology-ui
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
{{- end }}
