{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "lke-route-injector.serviceAccountName" . }}
  labels:
    {{- include "lke-route-injector.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# The route injector makes no Kubernetes API calls — token mounting is disabled.
automountServiceAccountToken: false
{{- end }}
