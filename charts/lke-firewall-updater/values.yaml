# ── Node filtering ────────────────────────────────────────────────────────────
nodes:
  # -- Kubernetes label selector. Only nodes matching this selector have their
  # ExternalIPs added to firewall rules. Empty string includes all nodes.
  # Example: "node-role.kubernetes.io/worker=true" or "node-type=worker"
  labelSelector: ""

# ── Node labeling ─────────────────────────────────────────────────────────────
nodeLabeling:
  # -- If true, label every node matching nodes.labelSelector after each
  # successful firewall reconcile. Requires RBAC patch verb on nodes (added
  # automatically). Disabled by default (principle of least privilege).
  enabled: false
  # -- Label key applied to nodes after a successful reconcile.
  labelKey: "firewall.lke.linode.com/ready"
  # -- Label value applied to nodes after a successful reconcile.
  labelValue: "true"

# ── Controller Deployment ─────────────────────────────────────────────────────
controller:
  # -- Number of replicas. With replicas > 1, leader election via Kubernetes
  # Lease ensures only one pod runs the reconciliation loop at a time; the
  # standby pod takes over automatically if the leader crashes.
  replicas: 2
  # -- Seconds to wait after a watch event before reconciling.
  # Absorbs burst registrations (e.g. 5 nodes booting at once → 1 reconcile).
  debounceSeconds: 3
  # -- Full reconcile interval in seconds (safety net for missed watch events).
  reconcileInterval: 300
  image:
    repository: alpine
    # -- For provider: gcp, override to google/cloud-sdk:alpine (gcloud pre-installed).
    tag: "3.21.3"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"
  # -- Extra labels added to controller pods.
  podLabels: {}
  # -- Node selector for controller pods.
  nodeSelector: {}
  # -- Tolerations for controller pods.
  tolerations: []

# ── Leader election ───────────────────────────────────────────────────────────
leaderElection:
  leaseDurationSeconds: 30
  renewIntervalSeconds: 10

# ── Rule configuration ────────────────────────────────────────────────────────
# Shared rule settings applied across all enabled providers.
rule:
  # -- Fallback rule name/label. Auto-detected as "lke-nodes-{cluster_id}" for
  # Linode; used as the Description column for AWS Security Group entries.
  name: "lke-nodes"
  # -- Protocol. "TCP" or "UDP". Normalized to lowercase for AWS.
  protocol: "TCP"
  # -- Port range in Linode format: "22", "80,443", or "1-65535".
  # For AWS: only single-range format is supported ("X-Y" or "X").
  ports: "1-65535"
  # -- Rule action. "ACCEPT" or "DROP". Linode only; ignored by AWS and GCP.
  action: "ACCEPT"

# ── Providers ─────────────────────────────────────────────────────────────────
# Enable one or more providers. The controller reconciles all enabled providers
# on every loop iteration using the same computed node IP list.
providers:

  # ── Linode Cloud Firewalls ──────────────────────────────────────────────────
  linode:
    # -- Set to true to manage Linode Cloud Firewall rules.
    # Defaults to true for backward compatibility with v0.1.x.
    enabled: true
    # -- Linode API token with Firewalls Read/Write scope.
    # Mutually exclusive with existingSecret — set exactly one.
    token: ""
    # -- Name of a pre-existing Kubernetes Secret containing the Linode token.
    existingSecret: ""
    # -- Key within the Secret that holds the token value.
    secretKey: "token"
    firewall:
      # -- REQUIRED. List of Linode Cloud Firewall IDs (integers).
      ids: []

  # ── AWS Security Groups ─────────────────────────────────────────────────────
  aws:
    # -- Set to true to manage AWS Security Group ingress rules.
    enabled: false
    # -- AWS region (e.g. "us-east-1").
    region: ""
    # -- Name of a pre-existing Secret containing AWS_ACCESS_KEY_ID and
    # AWS_SECRET_ACCESS_KEY keys.
    existingSecret: ""
    # -- Inline credentials (chart creates a Secret). Use existingSecret in production.
    accessKeyId: ""
    secretAccessKey: ""
    # -- List of Security Group IDs to manage.
    securityGroupIds: []

  # ── GCP VPC Firewall Rules ──────────────────────────────────────────────────
  gcp:
    # -- Set to true to manage GCP VPC Firewall Rules.
    enabled: false
    # -- GCP project ID.
    projectId: ""
    # -- Name of the VPC firewall rule to update.
    firewallRuleName: ""
    # -- Name of a pre-existing Secret whose "key.json" key contains a service
    # account JSON key with "compute.firewalls.update" permission.
    existingSecret: ""
    # -- Inline service account JSON (chart creates a Secret).
    # Use existingSecret in production.
    serviceAccountJson: ""

# ── Namespace ─────────────────────────────────────────────────────────────────
namespace:
  # -- Create the namespace as part of this Helm release.
  create: true

# ── ServiceAccount ────────────────────────────────────────────────────────────
serviceAccount:
  # -- If true, create a ServiceAccount.
  create: true
  name: ""
  annotations: {}

# -- Labels added to all resources.
commonLabels: {}
# -- Annotations added to all resources.
commonAnnotations: {}

nameOverride: ""
fullnameOverride: ""

# ── DEPRECATED — v0.1.x keys ──────────────────────────────────────────────────
# These keys are still accepted in v0.2.0 for backward compatibility and will
# be removed in v0.3.0. Migrate to providers.linode.* equivalents.
#
# linodeToken → providers.linode.token
# existingSecret → providers.linode.existingSecret
# secretKey → providers.linode.secretKey
# firewall.* → providers.linode.firewall.*
# daemonset.* and cronjob.* are removed — use controller.* instead.
linodeToken: ""
existingSecret: ""
secretKey: "token"
firewall:
  ids: []
  ruleName: "lke-nodes"
  protocol: "TCP"
  ports: "1-65535"
  action: "ACCEPT"
