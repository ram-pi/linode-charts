# -- Linode Cloud Firewalls to manage.
firewall:
  # -- REQUIRED. List of Linode Cloud Firewall IDs (integers).
  # The node IP will be registered in every firewall in this list.
  ids: []
  # -- Fallback label for the managed inbound rule entry.
  # When the LKE cluster ID can be auto-detected from node labels, the rule is
  # named "lke-nodes-{cluster_id}" instead. This value is only used when
  # auto-detection fails.
  ruleName: "lke-nodes"
  # -- Protocol for the managed rule.
  protocol: "TCP"
  # -- Ports expression in Linode format (e.g. "22", "1-65535", "80,443").
  ports: "1-65535"
  # -- Rule action: ACCEPT or DROP.
  action: "ACCEPT"

# -- Linode API token with Firewalls Read/Write scope.
# Mutually exclusive with existingSecret — set exactly one.
linodeToken: ""

# -- Name of a pre-existing Kubernetes Secret whose key holds the Linode API token.
# When set, linodeToken is ignored and no Secret resource is created.
existingSecret: ""

# -- Key within the Secret that holds the token value.
secretKey: "token"

namespace:
  # -- Create the namespace as part of this Helm release.
  # Set to false if you manage namespaces externally (e.g. via GitOps).
  create: true

daemonset:
  # -- Enable the node-registration DaemonSet.
  enabled: true
  image:
    repository: alpine
    tag: "3.21.3"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "10m"
      memory: "32Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"
  # -- Extra labels added to DaemonSet pods.
  podLabels: {}
  # -- Node selector applied to DaemonSet pods.
  nodeSelector: {}
  # -- Tolerations for the DaemonSet.
  tolerations: []

cronjob:
  # -- Enable the periodic cleanup CronJob.
  enabled: true
  # -- Cron schedule. Default: every 15 minutes.
  schedule: "*/15 * * * *"
  # -- Forbid prevents overlapping cleanup runs (safe for read-modify-write operations).
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  # -- Deadline in seconds for a job to start after missing its scheduled time.
  startingDeadlineSeconds: 120
  image:
    repository: alpine
    tag: "3.21.3"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
  # -- Node selector for CronJob pods.
  nodeSelector: {}
  tolerations: []

serviceAccount:
  # -- If true, create a ServiceAccount. Set to false to bring your own.
  create: true
  # -- Name override. Defaults to the chart fullname.
  name: ""
  annotations: {}

# -- Labels added to all resources.
commonLabels: {}
# -- Annotations added to all resources.
commonAnnotations: {}

nameOverride: ""
fullnameOverride: ""
