apiVersion: v2
name: lke-firewall-updater
description: >
  Keeps cloud firewall rules in sync with Kubernetes node public IPs.
  Supports Linode Cloud Firewalls, AWS Security Groups, and GCP VPC Firewall Rules.
  An event-driven single-writer controller (leader election via Kubernetes Lease)
  watches node changes and reconciles all enabled providers with zero race conditions.
type: application
version: 0.2.0
appVersion: "2.0.0"
keywords:
  - linode
  - aws
  - gcp
  - firewall
  - security-group
  - lke
  - networking
  - multi-cloud
sources:
  - https://github.com/ram-pi/linode-charts
maintainers:
  - name: ram-pi
