apiVersion: v2
name: lke-firewall-updater
description: >
  Keeps a Linode Cloud Firewall rule in sync with LKE node public IPs.
  A DaemonSet registers each node's IP on boot; a CronJob removes stale IPs.
type: application
version: 0.1.0
appVersion: "1.0.0"
keywords:
  - linode
  - firewall
  - lke
  - networking
sources:
  - https://github.com/linode/linode-charts
maintainers:
  - name: Linode
