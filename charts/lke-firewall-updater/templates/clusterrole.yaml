apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "lke-firewall-updater.fullname" . }}
  labels:
    {{- include "lke-firewall-updater.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
rules:
  # The controller lists and watches nodes (optionally filtered by labelSelector)
  # to collect ExternalIPs and reconcile all enabled cloud firewall providers.
  # watch is required for the event-driven stream; without it the API server
  # returns 403 and closes the connection immediately.
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["list", "get", "watch"]
  # Leader election: the controller acquires and renews a Kubernetes Lease so
  # that only one replica (the leader) runs the reconciliation loop at a time.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update"]
