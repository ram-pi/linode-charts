{{- if .Values.cronjob.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "lke-firewall-updater.fullname" . }}-cleanup
  labels:
    {{- include "lke-firewall-updater.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  schedule: {{ .Values.cronjob.schedule | quote }}
  concurrencyPolicy: {{ .Values.cronjob.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.cronjob.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.cronjob.failedJobsHistoryLimit }}
  startingDeadlineSeconds: {{ .Values.cronjob.startingDeadlineSeconds }}
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "lke-firewall-updater.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: cleanup
        spec:
          serviceAccountName: {{ include "lke-firewall-updater.serviceAccountName" . }}
          restartPolicy: OnFailure
          {{- with .Values.cronjob.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.cronjob.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumes:
            - name: scripts
              configMap:
                name: {{ include "lke-firewall-updater.fullname" . }}-scripts
                defaultMode: 0555
          containers:
            - name: cleanup
              image: "{{ .Values.cronjob.image.repository }}:{{ .Values.cronjob.image.tag }}"
              imagePullPolicy: {{ .Values.cronjob.image.pullPolicy }}
              # Install curl and jq from Alpine apk.
              # The cleanup script uses the Kubernetes API directly (curl + ServiceAccount token)
              # so no kubectl binary is needed.
              command: ["/bin/sh", "-c"]
              args:
                - "apk add --no-cache curl jq >/dev/null 2>&1 && /scripts/cleanup.sh"
              env:
                - name: LINODE_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "lke-firewall-updater.secretName" . }}
                      key: {{ .Values.secretKey }}
                - name: FIREWALL_IDS
                  value: {{ include "lke-firewall-updater.firewallIds" . | quote }}
                - name: RULE_NAME
                  value: {{ .Values.firewall.ruleName | quote }}
                - name: RULE_PROTOCOL
                  value: {{ .Values.firewall.protocol | quote }}
                - name: RULE_PORTS
                  value: {{ .Values.firewall.ports | quote }}
                - name: RULE_ACTION
                  value: {{ .Values.firewall.action | quote }}
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
              resources:
                {{- toYaml .Values.cronjob.resources | nindent 16 }}
{{- end }}
