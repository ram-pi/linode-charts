apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "lke-firewall-updater.fullname" . }}
  labels:
    {{- include "lke-firewall-updater.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "lke-firewall-updater.selectorLabels" . | nindent 6 }}
