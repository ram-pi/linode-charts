{{/*
── Validation ────────────────────────────────────────────────────────────────
Fail fast at helm template/install time with actionable error messages.
*/}}

{{- $linodeEnabled := .Values.providers.linode.enabled }}
{{- $awsEnabled    := .Values.providers.aws.enabled }}
{{- $gcpEnabled    := .Values.providers.gcp.enabled }}

{{/* At least one provider must be enabled */}}
{{- if not (or $linodeEnabled $awsEnabled $gcpEnabled) }}
{{- fail "No providers are enabled. Set providers.linode.enabled, providers.aws.enabled, or providers.gcp.enabled to true." }}
{{- end }}

{{/* ── Linode validation ── */}}
{{- if $linodeEnabled }}
{{- $resolvedIds := coalesce .Values.providers.linode.firewall.ids .Values.firewall.ids }}
{{- if not $resolvedIds }}
{{- fail "providers.linode.firewall.ids (or legacy firewall.ids) must be set to at least one Linode Cloud Firewall ID." }}
{{- end }}
{{/* Resolve token/secret directly (avoid include for empty-string comparison reliability) */}}
{{- $token  := coalesce .Values.providers.linode.token  .Values.linodeToken }}
{{- $secret := coalesce .Values.providers.linode.existingSecret .Values.existingSecret }}
{{- if and (not $secret) (not $token) }}
{{- fail "Either providers.linode.token or providers.linode.existingSecret must be set when providers.linode.enabled=true." }}
{{- end }}
{{- end }}

{{/* ── AWS validation ── */}}
{{- if $awsEnabled }}
{{- if not .Values.providers.aws.region }}
{{- fail "providers.aws.region must be set when providers.aws.enabled=true." }}
{{- end }}
{{- if not .Values.providers.aws.securityGroupIds }}
{{- fail "providers.aws.securityGroupIds must be set when providers.aws.enabled=true." }}
{{- end }}
{{- $awsCreds := coalesce .Values.providers.aws.existingSecret .Values.providers.aws.accessKeyId }}
{{- if not $awsCreds }}
{{- fail "Either providers.aws.existingSecret or providers.aws.accessKeyId+secretAccessKey must be set when providers.aws.enabled=true." }}
{{- end }}
{{- end }}

{{/* ── GCP validation ── */}}
{{- if $gcpEnabled }}
{{- if not .Values.providers.gcp.projectId }}
{{- fail "providers.gcp.projectId must be set when providers.gcp.enabled=true." }}
{{- end }}
{{- if not .Values.providers.gcp.firewallRuleName }}
{{- fail "providers.gcp.firewallRuleName must be set when providers.gcp.enabled=true." }}
{{- end }}
{{- $gcpCreds := coalesce .Values.providers.gcp.existingSecret .Values.providers.gcp.serviceAccountJson }}
{{- if not $gcpCreds }}
{{- fail "Either providers.gcp.existingSecret or providers.gcp.serviceAccountJson must be set when providers.gcp.enabled=true." }}
{{- end }}
{{- end }}

{{/*
── Linode Secret ─────────────────────────────────────────────────────────────
Created only when providers.linode.enabled=true and no existingSecret is provided.
*/}}
{{- if $linodeEnabled }}
{{- $token  := include "lke-firewall-updater.resolvedLinodeToken" . }}
{{- $secret := include "lke-firewall-updater.resolvedLinodeExistingSecret" . }}
{{- if and (not $secret) $token }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-linode" (include "lke-firewall-updater.fullname" .) }}
  labels:
    {{- include "lke-firewall-updater.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  {{ include "lke-firewall-updater.resolvedLinodeSecretKey" . }}: {{ $token | quote }}
{{- end }}
{{- end }}

{{/*
── AWS Secret ────────────────────────────────────────────────────────────────
Created only when providers.aws.enabled=true and no existingSecret is provided.
*/}}
{{- if $awsEnabled }}
{{- if and (not .Values.providers.aws.existingSecret) .Values.providers.aws.accessKeyId }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-aws" (include "lke-firewall-updater.fullname" .) }}
  labels:
    {{- include "lke-firewall-updater.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: {{ .Values.providers.aws.accessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.providers.aws.secretAccessKey | quote }}
{{- end }}
{{- end }}

{{/*
── GCP Secret ────────────────────────────────────────────────────────────────
Created only when providers.gcp.enabled=true and no existingSecret is provided.
The key "key.json" matches the GOOGLE_APPLICATION_CREDENTIALS mount path.
*/}}
{{- if $gcpEnabled }}
{{- if and (not .Values.providers.gcp.existingSecret) .Values.providers.gcp.serviceAccountJson }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-gcp" (include "lke-firewall-updater.fullname" .) }}
  labels:
    {{- include "lke-firewall-updater.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  key.json: {{ .Values.providers.gcp.serviceAccountJson | quote }}
{{- end }}
{{- end }}
