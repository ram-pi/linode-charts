apiVersion: coordination.k8s.io/v1
kind: Lease
metadata:
  name: {{ include "lke-vlan-controller-python.fullname" . }}-leader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lke-vlan-controller-python.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  leaseDurationSeconds: {{ .Values.leaderElection.leaseDurationSeconds }}
