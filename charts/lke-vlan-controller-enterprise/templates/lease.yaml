apiVersion: coordination.k8s.io/v1
kind: Lease
metadata:
  name: {{ include "lke-vlan-controller.fullname" . }}-leader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lke-vlan-controller.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  # holderIdentity and renewTime are written at runtime by the leader pod.
  # Only leaseDurationSeconds is set here so the object is valid at install time.
  leaseDurationSeconds: {{ .Values.leaderElection.leaseDurationSeconds }}
