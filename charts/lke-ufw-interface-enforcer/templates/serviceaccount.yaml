{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "lke-ufw-interface-enforcer.serviceAccountName" . }}
  labels:
    {{- include "lke-ufw-interface-enforcer.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# The enforcer performs host-level commands only and does not call Kubernetes APIs.
automountServiceAccountToken: false
{{- end }}
