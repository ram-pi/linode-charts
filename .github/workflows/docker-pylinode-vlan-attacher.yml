name: Docker Image - pylinode-vlan-attacher

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "features/**"
    paths:
      - "pylinode-vlan-attacher/**"
      - ".github/workflows/docker-pylinode-vlan-attacher.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read image version
        id: version
        run: |
          VERSION="$(tr -d '[:space:]' < pylinode-vlan-attacher/VERSION)"
          if [[ -z "$VERSION" ]]; then
            echo "VERSION file is empty" >&2
            exit 1
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "VERSION '$VERSION' is not a valid semantic version" >&2
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set image metadata
        id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/pylinode-vlan-attacher"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./pylinode-vlan-attacher
          file: ./pylinode-vlan-attacher/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.version.outputs.value }}
