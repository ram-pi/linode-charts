name: Helm Chart - lke-firewall-updater

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "charts/lke-firewall-updater/**"
      - ".github/workflows/helm-lke-firewall-updater.yml"
    tags:
      - "charts/lke-firewall-updater/v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v5.0.0
        with:
          version: "latest" # default is latest (stable)
        id: install

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read chart metadata
        id: chart
        run: |
          CHART_NAME="$(awk '$1 == "name:" { print $2; exit }' charts/lke-firewall-updater/Chart.yaml)"
          CHART_VERSION="$(awk '$1 == "version:" { print $2; exit }' charts/lke-firewall-updater/Chart.yaml)"

          if [[ -z "$CHART_NAME" || -z "$CHART_VERSION" ]]; then
            echo "Failed to determine chart metadata from charts/lke-firewall-updater/Chart.yaml" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF}" == refs/tags/charts/lke-firewall-updater/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/charts/lke-firewall-updater/v}"
            if [[ "$TAG_VERSION" != "$CHART_VERSION" ]]; then
              echo "Tag version $TAG_VERSION does not match chart version $CHART_VERSION" >&2
              exit 1
            fi
          fi

          echo "name=$CHART_NAME" >> $GITHUB_OUTPUT
          echo "version=$CHART_VERSION" >> $GITHUB_OUTPUT

      - name: Show chart metadata
        run: |
          echo "chart=${{ steps.chart.outputs.name }}"
          echo "version=${{ steps.chart.outputs.version }}"
          echo "ref=${GITHUB_REF}"

      - name: Package chart
        run: |
          helm package charts/lke-firewall-updater

      - name: Push to GHCR
        run: |
          helm push ${{ steps.chart.outputs.name }}-${{ steps.chart.outputs.version }}.tgz oci://ghcr.io/linode
