apiVersion: v1
kind: Service
metadata:
  name: webserver-clusterip
  labels:
    app: webserver
spec:
  # ClusterIP is the default type, but explicitly stating it is good practice
  type: ClusterIP
  selector:
    # This must match the labels on your Pod
    app: webserver
  ports:
    - protocol: TCP
      port: 80 # The port the Service will listen on
      targetPort: 80 # The port the container is listening on

---
apiVersion: v1
kind: Service
metadata:
  name: webserver-nodeport
  labels:
    app: webserver
spec:
  type: NodePort
  selector:
    app: webserver
  ports:
    - protocol: TCP
      port: 80 # The port the Service will listen on
      targetPort: 80 # The port the container is listening on
      nodePort: 30080 # Static port (must be in range 30000-32767)

---
apiVersion: v1
kind: Pod
metadata:
  name: webserver-pod
  labels:
    # This label maps the Pod to the Service above
    app: webserver
spec:
  containers:
    - name: nginx-webserver
      image: nginx:latest
      ports:
        - containerPort: 80

  # This is where you specify the node selector
  nodeSelector:
    # Example: This tells Kubernetes to only schedule this pod on a node labeled with 'lke-vlan-controller-status: completed'
    lke-vlan-controller-status: completed
